services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerly
      POSTGRES_USER: ledgerly
      POSTGRES_PASSWORD: ledgerly_dev
    ports:
      - "5432:5432"
    volumes:
      - ledgerly_pg:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=ledgerly;Username=ledgerly;Password=ledgerly_dev
      JWT_SECRET: replace-with-32-char-minimum-secret-key-here
    ports:
      - "5080:8080"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      ApiBaseUrl: http://api:8080
    ports:
      - "5081:8080"
    depends_on:
      - api

volumes:
  ledgerly_pg:
